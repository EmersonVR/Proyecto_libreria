<div class="page-header">
  <h1>Authors</h1>
</div>

<div class="page-grid">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ editing ? 'Edit author' : 'New author' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="form-stack" [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
          @if (form.controls.name.hasError('required')) {
            <mat-error>Name is required.</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Birth date</mat-label>
          <input matInput readonly [matDatepicker]="birthDatePicker" formControlName="birthDate" />
          <mat-datepicker-toggle matIconSuffix [for]="birthDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #birthDatePicker></mat-datepicker>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit">
            <mat-icon>save</mat-icon>
            Save
          </button>
          <button mat-button type="button" (click)="reset()">Cancel</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      @if (loading) {
        <div class="spinner-row"><mat-spinner diameter="36" /></div>
      } @else if (!authors.length) {
        <div class="empty-state">No authors found.</div>
      } @else {
        <div class="table-wrap">
          <table mat-table [dataSource]="authors">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let author">{{ author.name }}</td>
            </ng-container>
            <ng-container matColumnDef="birthDate">
              <th mat-header-cell *matHeaderCellDef>Birth date</th>
              <td mat-cell *matCellDef="let author">{{ author.birthDate | date: 'yyyy-MM-dd' }}</td>
            </ng-container>
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let author">
                <button mat-icon-button type="button" aria-label="Edit author" (click)="edit(author)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button type="button" aria-label="Delete author" (click)="confirmDelete(author)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
