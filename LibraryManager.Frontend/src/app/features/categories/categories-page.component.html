<div class="page-header">
  <h1>Categories</h1>
</div>

<div class="page-grid">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ editing ? 'Edit category' : 'New category' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="form-stack" [formGroup]="form" (ngSubmit)="save()">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
          @if (form.controls.name.hasError('required')) {
            <mat-error>Name is required.</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <textarea matInput rows="3" formControlName="description"></textarea>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit">
            <mat-icon>save</mat-icon>
            Save
          </button>
          <button mat-button type="button" (click)="reset()">Cancel</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      @if (loading) {
        <div class="spinner-row"><mat-spinner diameter="36" /></div>
      } @else if (!categories.length) {
        <div class="empty-state">No categories found.</div>
      } @else {
        <div class="table-wrap">
          <table mat-table [dataSource]="categories">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let category">{{ category.name }}</td>
            </ng-container>
            <ng-container matColumnDef="description">
              <th mat-header-cell *matHeaderCellDef>Description</th>
              <td mat-cell *matCellDef="let category">{{ category.description }}</td>
            </ng-container>
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let category">
                <button mat-icon-button type="button" aria-label="Edit category" (click)="edit(category)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button type="button" aria-label="Delete category" (click)="confirmDelete(category)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
